title: [TDD Adventures]
title_separator          : "-"
encoding: UTF-8
name: Giuseppe Caferra
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "air"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
- jemoji